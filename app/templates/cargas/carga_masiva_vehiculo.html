{% extends 'base.html' %}
{% block maincontent %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="containerForm">
                <h1 class="text-center">Carga Masiva de Vehiculos</h1>
                <form id="formularioCarga" method="post" action="{{ url_for('main.carga_masiva_vehiculo') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <div class="text-center">
                            <label for="archivo_excel">Seleccionar Archivo Excel (.xlsx, .xls)</label>
                            <input type="file" class="form-control-file" name="archivo_excel" accept=".xlsx, .xls" required>
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-success">Cargar Datos</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div id="loadingOverlay" class="overlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Por favor espere...</span>
    </div>
</div>
{% endblock maincontent %}
{% block scripts %}
<script>
    document.getElementById('formularioCarga').addEventListener('submit', function() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    });
</script>
{% endblock scripts %}
