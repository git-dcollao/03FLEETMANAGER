{% extends 'base.html' %}
{% block maincontent %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="containerForm">
                <h1 class="mb-4 text-center">Crear Falla</h1>
                <form method="post">
                    <div class="form-group">
                        <label for="nombre_falla" class="form-label">Nombre de la falla:</label>
                        <input type="text" class="form-control" id="nombre_falla" name="nombre_falla" required>
                    </div>
                    <div class="d-grid">
                        <div class="text-center"><button type="submit" class="btn btn-success" style="margin-top: 10px;">Crear Falla</button></div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock maincontent %}
