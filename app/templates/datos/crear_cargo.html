{% extends 'base.html' %}
{% block maincontent %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="containerForm">
                <h1 class="text-center mb-4">Crear Cargo</h1>
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre_cargo" class="form-label">Nombre del Cargo:</label>
                        <input type="text" class="form-control" id="nombre_cargo" name="nombre_cargo" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-block">Crear Cargo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock maincontent %}
