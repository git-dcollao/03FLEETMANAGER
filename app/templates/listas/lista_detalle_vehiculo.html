{% extends 'base.html' %}
{% block maincontent %}
<div class="container mt-5">
    <h1>Lista de Detalles de Tipo de Vehículo</h1>
    <table class="table">
        <thead>
            <tr>
                <th>Nombre del Subtipo</th>
                <th>Tipo de Vehículo</th>
            </tr>
        </thead>
        <tbody>
            {% for detalle in dtv %}
            <tr>
                <td>{{ detalle.nombre_dtv }}</td>
                <td>{{ detalle.tipo_vehiculo.nombre_tv }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock maincontent %}
