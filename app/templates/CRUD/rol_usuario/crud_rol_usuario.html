{% extends 'base.html' %}

{% block maincontent %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h3>Detalles del Rol de Usuario</h3>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong>ID:</strong>
                            <p>{{ rol_usuario.id_rol_usuario }}</p>
                        </div>
                        <div class="col-md-6">
                            <strong>Nombre del Rol de Usuario:</strong>
                            <p>{{ rol_usuario.nombre_rol_usuario }}</p>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <a href="{{ url_for('crud.editar_rol_usuario', id_rol_usuario=rol_usuario.id_rol_usuario) }}" class="btn btn-warning">
                            <i class="fas fa-edit"></i> Editar
                        </a>
                        <a href="{{ url_for('crud.eliminar_rol_usuario', id_rol_usuario=rol_usuario.id_rol_usuario) }}" class="btn btn-danger" onclick="return confirm('¿Está seguro de que desea eliminar este rol de usuario?');">
                            <i class="fas fa-trash"></i> Eliminar
                        </a>
                        <a href="{{ url_for('creation.crear_rol_usuario') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock maincontent %}
