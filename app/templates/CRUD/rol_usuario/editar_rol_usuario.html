{% extends 'base.html' %}

{% block maincontent %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h3>Editar Rol de Usuario</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label for="nombre_rol_usuario" class="form-label">Nombre del Rol de Usuario *</label>
                            <input type="text" class="form-control" id="nombre_rol_usuario" name="nombre_rol_usuario" value="{{ rol_usuario.nombre_rol_usuario }}" required maxlength="30" placeholder="Ingrese el nombre del rol de usuario">
                            <small class="form-text text-muted">Máximo 30 caracteres</small>
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                            <a href="{{ url_for('creation.crear_rol_usuario') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock maincontent %}
