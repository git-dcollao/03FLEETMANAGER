{% extends "base.html" %}

{% block maincontent %}
<div class="container mt-4">
    <h3>Editar Departamento</h3>

    {% if departamento %}
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('crud.editar_departamento', id_dpto_empresa=departamento.id_dpto_empresa) }}">
                    <div class="mb-3">
                        <label for="nombre_dpto_empresa" class="form-label">Nombre Departamento *</label>
                        <input type="text" class="form-control" id="nombre_dpto_empresa" name="nombre_dpto_empresa" value="{{ departamento.nombre_dpto_empresa }}" required maxlength="30">
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('creation.crear_departamento') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    {% else %}
        <div class="alert alert-danger">Departamento no encontrado</div>
        <a href="{{ url_for('creation.crear_departamento') }}" class="btn btn-secondary">Volver a la lista</a>
    {% endif %}
</div>
{% endblock maincontent %}
