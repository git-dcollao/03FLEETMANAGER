{% extends 'base.html' %}
{% block maincontent %}
<div class="text-center">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="display-6 mb-6">Opciones para el Área {{ area.nombre_area }}</h1>
        </div>
    </div>
    <div class="option-container">
        <div class="row justify-content-center">
            <div class="col-md-3 mb-4">
                <img src="../../../static/IMAGES/coordenadas/editar.png" alt="editar">
                <!-- <h5 class="card-title"></h5> -->
                <a href="{{ url_for('crud.editar_area', id_area=area.id_area) }}" class="btn btn-success">Editar</a>
            </div>
            <div class="col-md-3 mb-4">
                <img src="../../../static/IMAGES/coordenadas/eliminar.png" alt="eliminar">
                <!-- <h5 class="card-title"></h5> -->
                <a href="{{ url_for('crud.eliminar_area', id_area=area.id_area) }}" class="btn btn-danger">Eliminar</a>
            </div>
        </div>
    </div>
</div>
{% endblock maincontent %}
