{% extends 'base.html' %}
{% block maincontent %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card" style="background-color:  rgba(255, 255, 255, 0.5); padding-bottom: 10px; border-radius: 15px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);">
                <div class="card-header">
                    <h1 class="mb-0">Crear Usuario</h1>
                </div>
                <div class="card-body">
                    <form method="post" action="{{ url_for('auth.crear_usuario') }}">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="container mt-3">
                                    <div class="row justify-content-center">
                                        <div class="text-center">
                                            <div class="alert alert-danger" role="alert">
                                                {% for message in messages %}
                                                    {{ message }}
                                                {% endfor %}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            {% endif %}
                        {% endwith %}
                        <div class="form-group">
                            <label for="username">Usuario:</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña:</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="personal">Personal:</label>
                            <select class="form-control" id="personal" name="personal" required>
                                {% for personal in personales %}
                                    <option value="{{ personal.id_personal }}">{{ personal.nombre_personal }} {{ personal.apellido_paterno }} {{ personal.apellido_materno }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="rol_usuario">Rol Usuario:</label>
                            <select class="form-control" id="rol_usuario" name="rol_usuario" required>
                                {% for rol in rol_usuario %}
                                    <option value="{{ rol.id_rol_usuario }}">{{ rol.nombre_rol_usuario }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success" style="margin-top: 10px;">Crear Usuario</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock maincontent %}
