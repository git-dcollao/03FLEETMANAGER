<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Trayecto</title>
    <link rel="icon" href="../static/IMAGES/logo_hospicio.png"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="../static/CSS/estilo.css">
    <script src="../static/JS/scripts.js"></script>
</head>
<body class="bg-light">
    <button class="btn btn-success toggler" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar">
        <button type="button" class="btn-close close-btn" aria-label="Close" onclick="toggleSidebar()"></button>
        <div class="sidebar-content">
            <a href="https://maho.cl/web2/"><img src="../static/IMAGES/logo_hospicio.png" alt="logo_hospicio" class="logo mb-4"></a>
            <a href="{{ url_for('index') }}" class="btn btn-success d-block mb-2">Volver al inicio</a>
            <a href="{{ url_for('menu_coordenadas') }}" class="btn btn-success d-block mb-2">Menú Coordenadas</a>
            <a href="{{ url_for('menu_vehiculo') }}" class="btn btn-success d-block mb-2">Menú Vehiculo</a>
            <a href="{{ url_for('menu_personal') }}" class="btn btn-success d-block mb-2">Menú Personal</a>
            <a href="{{ url_for('menu_equipo') }}" class="btn btn-success d-block mb-2">Menú Equipo</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger d-block">Cerrar sesión</a>
        </div>
    </div>
    
    <div class="main-content" id="mainContent">
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <h1 class="text-center mb-4">Trayecto del vehículo {{ vehiculo.patente }}</h1>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="fecha" class="form-label">Selecciona una fecha:</label>
                            <select id="fecha" class="form-select">
                                {% for fecha in fechas_disponibles %}
                                    <option value="{{ fecha }}">{{ fecha }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="horaInicio" class="form-label">Hora de inicio:</label>
                            <input type="time" id="horaInicio" class="form-control" step="1" value="00:00:00">
                        </div>
                        <div class="col-md-4">
                            <label for="horaFin" class="form-label">Hora de fin:</label>
                            <input type="time" id="horaFin" class="form-control" step="1" value="23:59:59">
                        </div>
                    </div>
                    <div class="text-center mb-3">
                        <button id="graficarTrayecto" class="btn btn-primary me-3">Graficar Trayecto</button>
                        <button id="animarTrayecto" class="btn btn-primary me-3">Animar Trayecto</button>
                        <button id="mostrarMapaCalor" class="btn btn-primary me-3">Mostrar Mapa de Calor</button>
                    </div>
                    <div id="map" style="height: 500px;"></div>
                </div>
            </div>   
        </div>
    </div>
</body>
</html>
